<!-- Modal: Order Detail -->
<div id="modal-detail" class="overlay hidden"
    style="background:rgba(0,0,0,0.6); position:fixed; inset:0; z-index:9990; display:flex; justify-content:center; align-items:center;">
    <div class="bg-white w-100 p-0 m-3 rounded-4 shadow overflow-hidden"
        style="max-height:90vh; max-width:500px; display:flex; flex-direction:column;">
        <div class="modal-header bg-primary text-white p-3 d-flex justify-content-between align-items-center">
            <h6 class="modal-title fw-bold m-0" id="modalOrderTitle">Chi tiết đơn hàng</h6>
            <button type="button" class="btn-close btn-close-white" onclick="hide('modal-detail')"></button>
        </div>

        <div class="modal-body p-3 overflow-auto flex-grow-1" id="detail-content-area">
            <!-- Customer Info -->
            <div class="mb-3">
                <div class="small text-muted fw-bold mb-1 ml-1"><i class="bi bi-person me-1"></i>KHÁCH HÀNG</div>
                <div class="bg-light p-2 rounded border">
                    <div id="modalCustomerName" class="fw-bold text-dark">...</div>
                    <div id="modalAddress" class="text-muted small">...</div>
                </div>
            </div>

            <!-- Products -->
            <div class="mb-3">
                <div class="small text-muted fw-bold mb-1 ml-1"><i class="bi bi-box-seam me-1"></i>SẢN PHẨM</div>
                <div class="bg-light p-2 rounded border small" id="modalProductList">
                    <!-- JS Injection -->
                </div>
            </div>

            <!-- Chat Section Section -->
            <div class="mt-3 border-top pt-3">
                <div class="small text-muted fw-bold mb-2 ml-1 text-primary"><i class="bi bi-chat-dots me-1"></i>TRAO
                    ĐỔI</div>
                <div class="chat-container border rounded bg-white shadow-inner" style="height:250px; overflow-y:auto;"
                    id="chatMessages">
                    <div class="text-center text-muted p-4 small italic">Đang tải tin nhắn...</div>
                </div>

                <!-- Chat Input Area -->
                <div class="mt-2">
                    <div id="chatImagePreview" class="mb-2 d-none">
                        <div class="position-relative d-inline-block">
                            <img id="chatImageThumb" src="" class="rounded border"
                                style="max-height:60px; cursor:pointer">
                            <span
                                class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                                onclick="clearChatImage()" style="cursor:pointer">✕</span>
                        </div>
                    </div>

                    <div class="input-group">
                        <input type="file" id="chatImageInput" class="d-none" accept="image/*"
                            onchange="previewChatImage(this)">
                        <button class="btn btn-light border btn-sm" onclick="$('#chatImageInput').click()"
                            title="Gửi ảnh">
                            <i class="bi bi-image text-muted"></i>
                        </button>
                        <input type="text" class="form-control form-control-sm" id="chatInput"
                            placeholder="Nhập tin nhắn..." onkeydown="if(event.key==='Enter')sendChatMessage()">
                        <button class="btn btn-primary btn-sm px-3" onclick="sendChatMessage()">
                            <i class="bi bi-send-fill"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="modal-footer p-2 bg-light border-top d-flex gap-2">
            <button class="btn btn-secondary btn-sm flex-fill" onclick="hide('modal-detail')">Đóng</button>
            <div id="modalFooterActions" class="d-flex gap-2 flex-fill"></div>
        </div>
    </div>
</div>

<!-- Modal: Delivery Confirmation -->
<div id="modal-delivery" class="overlay hidden"
    style="background:rgba(0,0,0,0.5); position:fixed; inset:0; z-index:9990; display:flex; justify-content:center; align-items:center;">
    <div class="bg-white w-100 p-0 m-3 rounded-4 shadow overflow-hidden" style="max-height:90vh; max-width:500px;">
        <div class="p-3 bg-success text-white fw-bold d-flex justify-content-between align-items-center">
            <span id="del-modal-title">XÁC NHẬN HOÀN THÀNH</span>
            <button class="btn-close btn-close-white" onclick="hide('modal-delivery')"></button>
        </div>

        <div class="p-3 overflow-auto" style="max-height: calc(90vh - 120px);">
            <div class="mb-3">
                <label class="small fw-bold text-muted mb-1">CHỌN KHO:</label>
                <div class="btn-group w-100">
                    <input type="radio" class="btn-check" name="del-wh" id="del-wh1" value="LT1" checked>
                    <label class="btn btn-outline-success btn-sm" for="del-wh1">LT1</label>
                    <input type="radio" class="btn-check" name="del-wh" id="del-wh2" value="LT2">
                    <label class="btn btn-outline-success btn-sm" for="del-wh2">LT2</label>
                    <input type="radio" class="btn-check" name="del-wh" id="del-wh3" value="OTHER">
                    <label class="btn btn-outline-success btn-sm" for="del-wh3">Khác</label>
                </div>
            </div>

            <div class="alert alert-info py-2 small mb-3">
                <i class="bi bi-info-circle me-1"></i>Nhập thực tế & Chụp ảnh chứng minh.
            </div>

            <div id="delivery-items-list" class="mb-3"></div>

            <div class="mb-3">
                <label class="small fw-bold text-muted mb-1">📸 ẢNH CHỨNG MINH:</label>
                <input type="file" id="inp-del-img" class="form-control form-control-sm" accept="image/*" multiple>
            </div>

            <textarea id="inp-del-note" class="form-control mb-3" rows="2" placeholder="Ghi chú (nếu có)..."></textarea>

            <button id="btn-submit-delivery" class="btn btn-success w-100 py-3 fw-bold shadow-sm"
                onclick="submitDeliveryForm()">
                <i class="bi bi-check-circle me-1"></i>GỬI PHIẾU XÁC NHẬN
            </button>
            <button class="btn btn-light w-100 mt-2 text-muted border-0" onclick="hide('modal-delivery')">Hủy
                bỏ</button>
        </div>
    </div>
</div>

<!-- Modal: Transfer Stock -->
<div id="modal-transfer" class="overlay hidden"
    style="background:rgba(0,0,0,0.5); position:fixed; inset:0; z-index:9990; display:flex; justify-content:center; align-items:center;">
    <div class="bg-white w-100 p-4 m-3 rounded-4 shadow" style="max-height:90vh; overflow-y:auto;">
        <div class="d-flex justify-content-between mb-3">
            <h5 class="fw-bold m-0"><i class="bi bi-arrow-left-right"></i> CHUYỂN KHO</h5>
            <button class="btn btn-sm btn-light rounded-circle" onclick="hide('modal-transfer')">✕</button>
        </div>

        <div class="row g-2 mb-3">
            <div class="col-6">
                <label class="small fw-bold text-secondary">TỪ KHO</label>
                <select id="transfer-from" class="form-select">
                    <option value="LT1">KHO LT1</option>
                    <option value="LT2">KHO LT2</option>
                </select>
            </div>
            <div class="col-6">
                <label class="small fw-bold text-secondary">ĐẾN KHO</label>
                <select id="transfer-to" class="form-select">
                    <option value="LT2">KHO LT2</option>
                    <option value="LT1">KHO LT1</option>
                </select>
            </div>
        </div>

        <label class="small fw-bold text-secondary">HÀNG HÓA CHUYỂN:</label>
        <div id="transfer-items" class="mb-3"></div>

        <div class="card-custom bg-light border-0 p-3 mb-3">
            <label class="small fw-bold text-secondary">Thêm mặt hàng:</label>
            <input id="transfer-item-name" class="form-control mb-2" placeholder="Tên hàng...">
            <div class="row g-2">
                <div class="col-8">
                    <input type="number" id="transfer-item-qty" class="form-control" placeholder="Số lượng (Kg)">
                </div>
                <div class="col-4">
                    <button class="btn btn-secondary w-100" onclick="addTransferItem()">Thêm</button>
                </div>
            </div>
        </div>

        <button class="btn btn-primary w-100 py-3" onclick="submitTransfer()">XÁC NHẬN CHUYỂN KHO</button>
    </div>
</div>

<!-- Modal: Employee Detail -->
<div id="modal-employee" class="overlay hidden"
    style="background:rgba(0,0,0,0.5); position:fixed; inset:0; z-index:9990; display:flex; justify-content:center; align-items:center;">
    <div class="bg-white w-100 p-4 m-3 rounded-4 shadow" style="max-height:90vh; overflow-y:auto;">
        <div class="d-flex justify-content-between mb-3">
            <h5 class="fw-bold m-0 text-info"><i class="bi bi-person"></i> THÔNG TIN NHÂN VIÊN</h5>
            <button class="btn btn-sm btn-light rounded-circle" onclick="hide('modal-employee')">✕</button>
        </div>
        <div id="employee-detail-content"></div>
    </div>
</div>

<!-- Modal: Material Detail -->
<div id="modal-material" class="overlay hidden"
    style="background:rgba(0,0,0,0.5); position:fixed; inset:0; z-index:9990; display:flex; justify-content:center; align-items:center;">
    <div class="bg-white w-100 p-4 m-3 rounded-4 shadow" style="max-height:90vh; overflow-y:auto;">
        <div class="d-flex justify-content-between mb-3">
            <h5 class="fw-bold m-0" style="color:#8b5cf6"><i class="bi bi-box-seam"></i> CHI TIẾT VẬT TƯ</h5>
            <button class="btn btn-sm btn-light rounded-circle" onclick="hide('modal-material')">✕</button>
        </div>
        <div id="material-detail-content"></div>
    </div>
</div>

<!-- Modal: Adjust Stock -->
<div id="modal-adjust" class="overlay hidden"
    style="background:rgba(0,0,0,0.5); position:fixed; inset:0; z-index:9990; display:flex; justify-content:center; align-items:center;">
    <div class="bg-white w-100 p-4 m-3 rounded-4 shadow">
        <h5 class="fw-bold text-secondary mb-3"><i class="bi bi-calculator"></i> ĐIỀU CHỈNH TỒN KHO</h5>

        <div class="alert alert-light border mb-3">
            <strong id="adjust-item-name">...</strong>
            <div class="small text-muted">Tồn hiện tại: <strong id="adjust-current-qty">0</strong> Kg</div>
        </div>

        <div class="mb-3">
            <label class="small fw-bold text-secondary">SỐ LƯỢNG ĐIỀU CHỈNH:</label>
            <input type="number" id="adjust-qty" class="form-control" placeholder="Dương = tăng, Âm = giảm">
            <div class="small text-muted mt-1">Ví dụ: +100 để tăng, -50 để giảm</div>
        </div>

        <div class="mb-3">
            <label class="small fw-bold text-secondary">LÝ DO:</label>
            <select id="adjust-reason" class="form-select">
                <option value="Kiểm kê">Kiểm kê</option>
                <option value="Hao hụt">Hao hụt</option>
                <option value="Phát hiện thừa">Phát hiện thừa</option>
                <option value="Sửa lỗi nhập liệu">Sửa lỗi nhập liệu</option>
                <option value="Khác">Khác</option>
            </select>
        </div>

        <input type="hidden" id="adjust-warehouse">
        <input type="hidden" id="adjust-material-code">

        <button class="btn btn-primary w-100 py-2" onclick="submitAdjustment()">XÁC NHẬN</button>
        <button class="btn btn-light w-100 mt-2" onclick="hide('modal-adjust')">Hủy</button>
    </div>
</div>
