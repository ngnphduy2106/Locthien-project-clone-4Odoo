<!-- ====== MODALS ====== -->

<!-- Modal: Order Detail -->
<div id="modal-detail" class="overlay hidden"
    style="background:rgba(0,0,0,0.6); position:fixed; inset:0; z-index:9990; display:flex; justify-content:center; align-items:center;">
    <div class="bg-white w-100 p-4 m-3 rounded-4 shadow" style="max-height:80vh; overflow-y:auto;">
        <div class="d-flex justify-content-between mb-3 border-bottom pb-2">
            <h5 class="fw-bold m-0"><i class="bi bi-box-seam"></i> CHI TIẾT ĐƠN</h5>
            <button class="btn btn-sm btn-light rounded-circle" onclick="hide('modal-detail')">✕</button>
        </div>
        <div id="detail-content"></div>
        <button class="btn btn-secondary w-100 mt-3" onclick="hide('modal-detail')">Đóng</button>
    </div>
</div>

<!-- Modal: Delivery Confirmation -->
<div id="modal-delivery" class="overlay hidden"
    style="background:rgba(0,0,0,0.5); position:fixed; inset:0; z-index:9990; display:flex; justify-content:center; align-items:center;">
    <div class="bg-white w-100 p-4 m-3 rounded-4 shadow">
        <h5 class="fw-bold text-success mb-3">XÁC NHẬN GIAO/NHẬP</h5>
        <div class="alert alert-light border small">Nhập số lượng thực tế & Chụp ảnh.</div>
        <div id="delivery-items-list" class="mb-3"></div>
        <label class="small fw-bold mb-1">📸 Ảnh chứng minh (Bắt buộc):</label>
        <input type="file" id="inp-del-img" class="form-control mb-3" accept="image/*">
        <button class="btn btn-success w-100 py-2" onclick="doFinishDelivery()">HOÀN THÀNH</button>
        <button class="btn btn-light w-100 mt-2" onclick="hide('modal-delivery')">Hủy</button>
    </div>
</div>

<!-- Modal: Transfer Stock -->
<div id="modal-transfer" class="overlay hidden"
    style="background:rgba(0,0,0,0.5); position:fixed; inset:0; z-index:9990; display:flex; justify-content:center; align-items:center;">
    <div class="bg-white w-100 p-4 m-3 rounded-4 shadow" style="max-height:90vh; overflow-y:auto;">
        <div class="d-flex justify-content-between mb-3">
            <h5 class="fw-bold m-0"><i class="bi bi-arrow-left-right"></i> CHUYỂN KHO</h5>
            <button class="btn btn-sm btn-light rounded-circle" onclick="hide('modal-transfer')">✕</button>
        </div>

        <div class="row g-2 mb-3">
            <div class="col-6">
                <label class="small fw-bold text-secondary">TỪ KHO</label>
                <select id="transfer-from" class="form-select">
                    <option value="LT1">KHO LT1</option>
                    <option value="LT2">KHO LT2</option>
                </select>
            </div>
            <div class="col-6">
                <label class="small fw-bold text-secondary">ĐẾN KHO</label>
                <select id="transfer-to" class="form-select">
                    <option value="LT2">KHO LT2</option>
                    <option value="LT1">KHO LT1</option>
                </select>
            </div>
        </div>

        <label class="small fw-bold text-secondary">HÀNG HÓA CHUYỂN:</label>
        <div id="transfer-items" class="mb-3"></div>

        <div class="card-custom bg-light border-0 p-3 mb-3">
            <label class="small fw-bold text-secondary">Thêm mặt hàng:</label>
            <input id="transfer-item-name" class="form-control mb-2" placeholder="Tên hàng...">
            <div class="row g-2">
                <div class="col-8">
                    <input type="number" id="transfer-item-qty" class="form-control" placeholder="Số lượng (Kg)">
                </div>
                <div class="col-4">
                    <button class="btn btn-secondary w-100" onclick="addTransferItem()">Thêm</button>
                </div>
            </div>
        </div>

        <button class="btn btn-primary w-100 py-3" onclick="submitTransfer()">XÁC NHẬN CHUYỂN KHO</button>
    </div>
</div>

<!-- Modal: Employee Detail -->
<div id="modal-employee" class="overlay hidden"
    style="background:rgba(0,0,0,0.5); position:fixed; inset:0; z-index:9990; display:flex; justify-content:center; align-items:center;">
    <div class="bg-white w-100 p-4 m-3 rounded-4 shadow" style="max-height:90vh; overflow-y:auto;">
        <div class="d-flex justify-content-between mb-3">
            <h5 class="fw-bold m-0 text-info"><i class="bi bi-person"></i> THÔNG TIN NHÂN VIÊN</h5>
            <button class="btn btn-sm btn-light rounded-circle" onclick="hide('modal-employee')">✕</button>
        </div>
        <div id="employee-detail-content"></div>
    </div>
</div>

<!-- Modal: Material Detail -->
<div id="modal-material" class="overlay hidden"
    style="background:rgba(0,0,0,0.5); position:fixed; inset:0; z-index:9990; display:flex; justify-content:center; align-items:center;">
    <div class="bg-white w-100 p-4 m-3 rounded-4 shadow" style="max-height:90vh; overflow-y:auto;">
        <div class="d-flex justify-content-between mb-3">
            <h5 class="fw-bold m-0" style="color:#8b5cf6"><i class="bi bi-box-seam"></i> CHI TIẾT VẬT TƯ</h5>
            <button class="btn btn-sm btn-light rounded-circle" onclick="hide('modal-material')">✕</button>
        </div>
        <div id="material-detail-content"></div>
    </div>
</div>

<!-- Modal: Adjust Stock -->
<div id="modal-adjust" class="overlay hidden"
    style="background:rgba(0,0,0,0.5); position:fixed; inset:0; z-index:9990; display:flex; justify-content:center; align-items:center;">
    <div class="bg-white w-100 p-4 m-3 rounded-4 shadow">
        <h5 class="fw-bold text-secondary mb-3"><i class="bi bi-calculator"></i> ĐIỀU CHỈNH TỒN KHO</h5>

        <div class="alert alert-light border mb-3">
            <strong id="adjust-item-name">...</strong>
            <div class="small text-muted">Tồn hiện tại: <strong id="adjust-current-qty">0</strong> Kg</div>
        </div>

        <div class="mb-3">
            <label class="small fw-bold text-secondary">SỐ LƯỢNG ĐIỀU CHỈNH:</label>
            <input type="number" id="adjust-qty" class="form-control" placeholder="Dương = tăng, Âm = giảm">
            <div class="small text-muted mt-1">Ví dụ: +100 để tăng, -50 để giảm</div>
        </div>

        <div class="mb-3">
            <label class="small fw-bold text-secondary">LÝ DO:</label>
            <select id="adjust-reason" class="form-select">
                <option value="Kiểm kê">Kiểm kê</option>
                <option value="Hao hụt">Hao hụt</option>
                <option value="Phát hiện thừa">Phát hiện thừa</option>
                <option value="Sửa lỗi nhập liệu">Sửa lỗi nhập liệu</option>
                <option value="Khác">Khác</option>
            </select>
        </div>

        <input type="hidden" id="adjust-warehouse">
        <input type="hidden" id="adjust-material-code">

        <button class="btn btn-primary w-100 py-2" onclick="submitAdjustment()">XÁC NHẬN</button>
        <button class="btn btn-light w-100 mt-2" onclick="hide('modal-adjust')">Hủy</button>
    </div>
</div>
