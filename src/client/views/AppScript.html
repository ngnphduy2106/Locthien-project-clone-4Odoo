<script>
    // ===============================================
    // LỘC THIÊN ERP - MAIN APP SCRIPT
    // ===============================================

    // === PRODUCT DEFINITIONS ===
    const PRODS = [
        { name: "NaOH", subs: [{ n: "32%" }, { n: "45%" }, { n: "50%" }, { n: "99%" }] },
        { name: "HCl", subs: [{ n: "32%" }, { n: "35%" }] },
        { name: "H2SO4", subs: [{ n: "10%" }, { n: "32%" }, { n: "50%" }, { n: "98%" }] },
        { name: "PAC", subs: [{ n: "10%" }, { n: "17%" }, { n: "31%" }] },
        { name: "Javel", subs: [{ n: "10%" }, { n: "12%" }] },
        { name: "Silicat", d: 1.4 },
        { name: "FeCl2", d: 1.2 },
        { name: "FeCl2 (T)", subs: [{ n: "ĐẠT" }, { n: "LỖI" }] },
        { name: "NH4Cl", d: 1 },
        { name: "Polymer", subs: [{ n: "Cation" }, { n: "Anion" }] },
        { name: "Vỏ/Can", type: "shell_group", subs: [{ n: "Can 30L" }, { n: "Phuy 200L" }, { n: "Tank 1000L" }] },
        { name: "Khác", d: 1 }
    ];

    // === STATE ===
    let state = {
        user: null,
        staff: [],
        trucks: [],
        customers: [],
        suppliers: [],
        drivers: [],
        myOrders: [],
        cart: [],
        currentOrder: null,
        type: 'XUAT',
        isShellMode: false,
        currentUnit: 'Kg',
        mixTarget: 'ING',
        mixIngredients: [],
        materials: [],
        employees: [],
        warehouseData: [],
        currentWarehouse: 'LT1',
        transferItems: []
    };

    let currentRptMode = 'HIST';
    let globalData = { allPending: [], allAssigned: [], pending: [], assigned: [], drivers: [] };
    let importCart = [];

    // === UTILITIES ===
    const show = (id) => $(`#${id}`).removeClass('hidden');
    const hide = (id) => $(`#${id}`).addClass('hidden');

    const showScreen = (id) => {
        const screens = [
            'view-login', 'view-home', 'view-admin-dispatch', 'view-driver-orders', 'view-form',
            'view-mixing', 'view-report', 'view-create-import', 'view-hr', 'view-materials', 'view-warehouse'
        ];
        screens.forEach(s => hide(s));
        show(id);

        // Load data for specific screens
        if (id === 'view-create-import') initCreateImport();
        if (id === 'view-hr') loadEmployees();
        if (id === 'view-materials') loadMaterials();
        if (id === 'view-warehouse') loadWarehouseData();
        if (id === 'view-driver-orders') loadMyOrders();
    };

    const showLoading = (text = 'Đang xử lý...') => {
        $('#load-txt').text(text);
        show('loading');
    };

    const hideLoading = () => hide('loading');

    // === INITIALIZATION ===
    $(document).ready(function () {
        let sess = localStorage.getItem('LT_SESS_V2');
        if (sess) {
            try {
                state = { ...state, ...JSON.parse(sess) };
                if (state.user) initApp();
                else showScreen('view-login');
            } catch (e) {
                showScreen('view-login');
            }
        } else {
            showScreen('view-login');
        }
    });

    // === AUTHENTICATION ===
    function handleLogin() {
        const u = $('#inp-user').val().trim();
        const p = $('#inp-pass').val().trim();
        if (!u || !p) return alert("Vui lòng nhập đủ thông tin!");

        showLoading('Đang kết nối...');
        google.script.run
            .withSuccessHandler(res => {
                hideLoading();
                if (res.error) {
                    alert("Lỗi: " + res.msg);
                } else {
                    state.user = res.user;
                    state.staff = res.staffList || [];
                    state.trucks = res.truckList || [];
                    state.customers = res.customerList || [];
                    state.suppliers = res.supplierList || [];
                    state.drivers = res.drivers || [];
                    localStorage.setItem('LT_SESS_V2', JSON.stringify(state));
                    initApp();
                }
            })
            .withFailureHandler(e => {
                hideLoading();
                alert("Lỗi mạng!");
            })
            .doLogin(u, p);
    }

    function doLogout() {
        localStorage.removeItem('LT_SESS_V2');
        location.reload();
    }

    function toggleUserMenu(event) {
        if (event) event.stopPropagation();
        const menu = $('#user-menu');
        menu.toggleClass('hidden');

        // Close menu when clicking outside
        if (!menu.hasClass('hidden')) {
            const closeMenu = (e) => {
                if (!$(e.target).closest('#user-avatar, #user-menu').length) {
                    menu.addClass('hidden');
                    document.removeEventListener('click', closeMenu);
                }
            };
            document.addEventListener('click', closeMenu);
        }
    }

    function initApp() {
        $('#txt-user-name, #menu-user-name').text(state.user.name);
        $('#txt-user-role, #menu-user-role').text(state.user.role);

        hide('area-admin');
        hide('area-driver');

        if (['ADMIN', 'TESTER', 'MANAGER'].includes(state.user.role)) {
            show('area-admin');
            show('area-driver');
        } else if (state.user.role === 'DRIVER') {
            show('area-driver');
        }

        showScreen('view-home');
    }

    function createUser() {
        const data = {
            fullname: $('#new-u').val(),
            username: $('#new-p').val(),
            password: $('#new-pass').val(),
            plate: $('#new-plate').val(),
            role: $('#new-role').val()
        };

        showLoading();
        google.script.run
            .withSuccessHandler(res => {
                hideLoading();
                alert(res.msg);
                if (!res.error) {
                    $('#new-u, #new-p, #new-pass, #new-plate').val('');
                }
            })
            .createDriverAccount(data);
    }

    // === ORDER MANAGEMENT ===
    function loadAdminDispatch() {
        showScreen('view-admin-dispatch');
        $('#viewPending').html('<div class="text-center mt-5"><div class="loading-spinner mx-auto"></div></div>');

        google.script.run
            .withSuccessHandler(res => {
                globalData.allPending = res.pending || [];
                globalData.allAssigned = res.assigned || [];
                globalData.drivers = res.drivers || [];
                resetFilters(false);
                globalData.pending = globalData.allPending;
                globalData.assigned = globalData.allAssigned;
                updateCountsAndRender();
                switchTab('pending');
            })
            .getAdminOrders();
    }

    function resetFilters(r = true) {
        $('#filter-date').val('');
        $('#filter-cust').val('');
        if (r) applyFilters();
    }

    function applyFilters() {
        const d = $('#filter-date').val();
        const c = $('#filter-cust').val().toLowerCase().trim();
        const f = (l) => l.filter(i => (!d || i.ngay === d) && (!c || i.khach.toLowerCase().includes(c)));
        globalData.pending = f(globalData.allPending);
        globalData.assigned = f(globalData.allAssigned);
        updateCountsAndRender();
    }

    function updateCountsAndRender() {
        $('#countPending').text(globalData.pending.length);
        const t = $('#tabPending').hasClass('active') ? 'pending' : 'assigned';
        renderList(t === 'pending' ? globalData.pending : globalData.assigned, t === 'pending' ? 'viewPending' : 'viewAssigned', t !== 'pending');
    }

    function switchTab(t) {
        if (t === 'pending') {
            show('viewPending'); hide('viewAssigned');
            $('#tabPending').addClass('active');
            $('#tabAssigned').removeClass('active');
        } else {
            hide('viewPending'); show('viewAssigned');
            $('#tabPending').removeClass('active');
            $('#tabAssigned').addClass('active');
        }
        renderList(t === 'pending' ? globalData.pending : globalData.assigned, t === 'pending' ? 'viewPending' : 'viewAssigned', t !== 'pending');
    }

    function renderList(l, id, ed) {
        const c = $(`#${id}`);
        c.empty();
        if (!l.length) return c.html('<div class="text-center mt-5 text-secondary"><i class="bi bi-inbox fs-1"></i><div class="mt-2">Không có đơn hàng.</div></div>');

        l.forEach(i => {
            let opts = '<option value="">Chọn tài xế...</option>';
            if (globalData.drivers) {
                globalData.drivers.forEach(d => {
                    opts += `<option value="${d.name}|${d.plate}" ${i.taiXe === d.name ? 'selected' : ''}>${d.name} - ${d.plate}</option>`;
                });
            }
            if (i.taiXe && !globalData.drivers.some(d => d.name === i.taiXe)) {
                opts += `<option value="${i.taiXe}" selected>${i.taiXe} (Xe ngoài)</option>`;
            }
            opts += '<option value="OTHER">Xe ngoài...</option>';

            const btnLabel = ed ? "SỬA" : "GÁN";
            const btnClass = ed ? "btn-secondary" : "btn-primary";
            const btn = `<button class="btn ${btnClass}" style="height:42px; min-width:80px;" onclick="assign(${i.rowIndex})">${btnLabel}</button>`;
            const iconClass = i.type === 'IMPORT' ? 'icon-import' : 'icon-export';

            let pHtml = '';
            if (i.products && i.products.length > 0) {
                i.products.forEach(p => {
                    pHtml += `<div class="prod-item"><span>${p.name}</span><span class="fw-bold">${Number(p.qty).toLocaleString()} ${p.unit}</span></div>`;
                });
            } else {
                pHtml = '<div class="text-secondary small fst-italic">Không có thông tin hàng</div>';
            }

            c.append(`
      <div class="order-card">
        <div class="d-flex justify-content-between mb-2">
          <span class="badge bg-light text-dark border"><span class="circle-icon ${iconClass}"></span>#${i.soDon}</span>
          <span class="small fw-bold text-primary">${i.ngay}</span>
        </div>
        <h6 class="fw-bold mb-1">${i.khach}</h6>
        <div class="text-secondary small mb-3"><i class="bi bi-geo-alt me-1"></i>${i.diaChi}</div>
        <div class="bg-light p-2 rounded mb-3 border">${pHtml}</div>
        <div class="d-flex gap-2 align-items-center">
          <select class="form-select mb-0" id="drv_${i.rowIndex}" style="height:42px" onchange="chkOther(${i.rowIndex})">${opts}</select>
          ${btn}
        </div>
        <div id="other_${i.rowIndex}" class="hidden mt-2 p-2 bg-light rounded border">
          <input id="name_${i.rowIndex}" class="form-control form-control-sm mb-2" placeholder="Tên tài xế ngoài..." value="${i.taiXe || ''}">
          <input id="plate_${i.rowIndex}" class="form-control form-control-sm text-uppercase" placeholder="Biển số..." value="${i.bienSo || ''}">
        </div>
      </div>
    `);
        });
    }

    function chkOther(i) {
        const v = $('#drv_' + i).val();
        const d = $('#other_' + i);
        if (v === 'OTHER') d.removeClass('hidden');
        else d.addClass('hidden');
    }

    function assign(idx) {
        let v = $('#drv_' + idx).val(), name = "", plate = "";
        if (v === 'OTHER') {
            name = $('#name_' + idx).val().trim();
            plate = $('#plate_' + idx).val().trim().toUpperCase();
            if (!name || !plate) return alert("Nhập đủ tên và biển số xe ngoài!");
        } else if (v) {
            const p = v.split('|');
            name = p[0];
            plate = p[1] || "";
        } else {
            return alert("Chọn tài xế!");
        }

        showLoading();
        google.script.run
            .withSuccessHandler(() => {
                hideLoading();
                loadAdminDispatch();
            })
            .adminAssignOrder(idx, name, plate);
    }

    // === DRIVER ORDERS ===
    state.currentDriverTab = 'active';

    function switchDriverTab(tab) {
        state.currentDriverTab = tab;

        // UI Contrast Fix
        if (tab === 'active') {
            $('#drv-tab-active').addClass('active');
            $('#drv-tab-history').removeClass('active');
        } else {
            $('#drv-tab-history').addClass('active');
            $('#drv-tab-active').removeClass('active');
        }

        renderDriverOrders();
    }

    function loadMyOrders() {
        showScreen('view-driver-orders');
        $('#my-orders-list').html('<div class="text-center mt-5"><div class="loading-spinner mx-auto"></div></div>');

        google.script.run
            .withSuccessHandler(r => {
                state.myOrders = r.data || [];

                // Calculate counts
                const activeCount = state.myOrders.filter(o =>
                    !['Đã thực hiện', 'Đã giao hàng', 'Đã hủy bỏ'].includes(o.status)
                ).length;
                const historyCount = state.myOrders.length - activeCount;

                // Update Tab Badges
                $('#drv-tab-active').html(`Đang chạy <span class="badge bg-white text-primary ms-1">${activeCount}</span>`);
                $('#drv-tab-history').html(`Lịch sử <span class="badge bg-light text-secondary ms-1">${historyCount}</span>`);

                renderDriverOrders();
            })
            .getMyOrders(state.user.name, state.user.role);
    }

    function renderDriverOrders() {
        const list = state.myOrders.filter(o => {
            const isCompleted = o.status === 'Đã thực hiện' || o.status === 'Đã giao hàng' || o.status === 'Đã hủy bỏ';
            if (state.currentDriverTab === 'active') return !isCompleted;
            return isCompleted;
        });

        const c = $('#my-orders-list');
        c.empty();

        if (!list.length) {
            const otherTab = state.currentDriverTab === 'active' ? 'Lịch sử' : 'Đang chạy';
            return c.html(`
                <div class="text-center mt-5 text-secondary">
                    <i class="bi bi-truck fs-1 text-muted opacity-50"></i>
                    <div class="mt-2 fw-bold">Trống ở mục này</div>
                    <div class="small text-muted mt-1">Bạn có thể kiểm tra tab <b>"${otherTab}"</b>.</div>
                </div>`);
        }

        list.forEach(o => {
            const isDelivering = o.statusCode === 'DANG_GIAO';
            const isHistory = state.currentDriverTab === 'history';

            let statusBadge = isDelivering
                ? '<span class="badge bg-primary bg-opacity-10 text-primary border border-primary px-2"><i class="bi bi-lightning-fill"></i> Đang giao</span>'
                : (isHistory
                    ? '<span class="badge bg-success bg-opacity-10 text-success border border-success px-2"><i class="bi bi-check-all"></i> Hoàn thành</span>'
                    : '<span class="badge bg-warning bg-opacity-10 text-warning border border-warning px-2"><i class="bi bi-hourglass-split"></i> Chờ nhận</span>');

            let btnAction = '';
            if (!isHistory) {
                btnAction = isDelivering
                    ? `<button class="btn btn-success fw-bold flex-fill shadow-sm" onclick="event.stopPropagation(); doFinish('${o.rowIndex}')"><i class="bi bi-check-lg"></i> HOÀN THÀNH</button>`
                    : `<button class="btn btn-primary fw-bold flex-fill shadow-sm" onclick="event.stopPropagation(); setStatus('${o.rowIndex}')"><i class="bi bi-truck"></i> NHẬN ĐƠN</button>`;
            }

            // Products summary
            const prodSum = (o.products || []).slice(0, 2).map(p =>
                `<div class="d-flex justify-content-between small"><span>${p.name}</span><span class="fw-bold">${p.qty} ${p.unit}</span></div>`
            ).join('');
            const more = (o.products || []).length > 2 ? `<div class="text-center small text-muted fst-italic">+ ${(o.products.length - 2)} SP khác</div>` : '';

            // Card HTML
            c.append(`
                <div class="card bg-white border-0 shadow-sm mb-3 rounded-4 overflow-hidden" onclick="showDetail('${encodeURIComponent(JSON.stringify(o))}')">
                    <div class="card-body p-0">
                        <div class="p-3 border-bottom bg-light bg-opacity-25">
                            <div class="d-flex justify-content-between mb-1">
                                <h6 class="fw-bold text-dark text-truncate mb-0" style="max-width:70%">${o.khach}</h6>
                                ${statusBadge}
                            </div>
                            <div class="small text-muted"><i class="bi bi-calendar3 me-1"></i>${o.ngay} <span class="mx-1">•</span> <i class="bi bi-geo-alt me-1"></i>${o.diaChi || 'Trống'}</div>
                        </div>
                        <div class="p-3">
                            <div class="bg-light p-2 rounded mb-3 border border-light">
                                ${prodSum}
                                ${more}
                            </div>
                            <div class="d-flex gap-2">
                                <button class="btn btn-light border flex-fill text-primary" onclick="event.stopPropagation(); showDetail('${encodeURIComponent(JSON.stringify(o))}')">
                                    <i class="bi bi-chat-dots-fill"></i> Chat
                                </button>
                                ${btnAction}
                            </div>
                        </div>
                    </div>
                </div>
            `);
        });
    }

    function showDetail(j) {
        const o = JSON.parse(decodeURIComponent(j));
        state.currentOrder = o; // Store for chat/actions

        // Header
        $('#modalOrderTitle').text(`#${o.soDon} - ${o.khach}`);
        $('#modalCustomerName').text(o.khach);
        $('#modalAddress').html(`<i class="bi bi-geo-alt-fill text-danger me-1"></i> ${o.diaChi || '---'}`);

        // Products
        const list = $('#modalProductList');
        list.empty();
        if (o.products && o.products.length > 0) {
            o.products.forEach(p => {
                list.append(`
                    <div class="d-flex justify-content-between py-1 border-bottom border-light">
                        <span class="text-dark">${p.name}</span>
                        <span class="fw-bold text-primary">${p.qty} ${p.unit}</span>
                    </div>
                `);
            });
        } else {
            list.html('<div class="text-center text-muted py-2 fst-italic">Không có thông tin SP</div>');
        }

        // Footer Actions based on role and status
        const footer = $('#modalFooterActions');
        footer.empty();
        const role = (state.user.role || '').toUpperCase();
        const isAssigned = (o.statusCode === 'DANG_GIAO');
        const isMe = (o.taiXe === state.user.name);

        if (isAssigned && (isMe || role === 'ADMIN' || role === 'TESTER')) {
            footer.append(`<button class="btn btn-success btn-sm flex-fill fw-bold" onclick="openDeliveryModal('${encodeURIComponent(JSON.stringify(o))}')"><i class="bi bi-check-lg"></i> HOÀN THÀNH</button>`);
        }

        // Chat
        loadOrderChat(o.id || o.soDon);

        show('modal-detail');
    }

    // --- CHAT LOGIC ---
    let chatInterval = null;
    function loadOrderChat(orderId) {
        const container = $('#chatMessages');
        container.html('<div class="text-center p-4"><div class="spinner-border spinner-border-sm text-primary"></div></div>');

        if (chatInterval) clearInterval(chatInterval);

        const fetchChat = () => {
            google.script.run
                .withSuccessHandler(res => {
                    if (res && res.messages) renderChatMessages(res.messages);
                })
                .getOrderChat(orderId);
        };

        fetchChat();
        chatInterval = setInterval(fetchChat, 5000); // Auto refresh
    }

    function renderChatMessages(msgs) {
        const c = $('#chatMessages');
        const isAtBottom = c.scrollTop() + c.innerHeight() >= c[0].scrollHeight - 50;

        c.empty();
        if (!msgs.length) {
            c.html('<div class="text-center text-muted p-4 small italic">Chưa có trao đổi nào.</div>');
            return;
        }

        msgs.forEach(m => {
            const isMe = m.sender_name === state.user.name;
            const align = isMe ? 'text-end' : 'text-start';
            const bg = isMe ? 'bg-primary text-white' : 'bg-light text-dark';
            const margin = isMe ? 'ms-auto' : 'me-auto';
            const imgHtml = m.image ? `<img src="${m.image}" class="img-fluid rounded mt-1 mb-1 border" style="max-height:150px; cursor:zoom-in" onclick="window.open('${m.image}')">` : '';

            c.append(`
                <div class="mb-2 ${align}">
                    <div class="small text-muted mb-1 px-1" style="font-size:10px">${m.sender_name} (${m.sender_role})</div>
                    <div class="d-inline-block p-2 rounded-3 shadow-sm ${bg} ${margin}" style="max-width:85%; word-wrap:break-word; font-size:13px">
                        ${m.message ? `<div>${m.message}</div>` : ''}
                        ${imgHtml}
                    </div>
                </div>
            `);
        });

        if (isAtBottom) c.scrollTop(c[0].scrollHeight);
    }

    function sendChatMessage() {
        const msg = $('#chatInput').val().trim();
        const img = $('#chatImageThumb').attr('src') || null;
        if (!msg && !img) return;

        const orderId = state.currentOrder.id || state.currentOrder.soDon;

        // Visual feedback
        $('#chatInput').val('').prop('disabled', true);

        google.script.run
            .withSuccessHandler(res => {
                $('#chatInput').prop('disabled', false).focus();
                clearChatImage();
                loadOrderChat(orderId);
            })
            .sendOrderChat(orderId, {
                sender_name: state.user.name,
                sender_role: state.user.role,
                message: msg,
                image: img
            });
    }

    function previewChatImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => {
                $('#chatImageThumb').attr('src', e.target.result);
                $('#chatImagePreview').removeClass('d-none');
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function clearChatImage() {
        $('#chatImageInput').val('');
        $('#chatImageThumb').attr('src', '');
        $('#chatImagePreview').addClass('d-none');
    }

    // --- DELIVERY FORM ---
    function openDeliveryModal(j) {
        const o = JSON.parse(decodeURIComponent(j));
        state.currentOrder = o;

        $('#del-modal-title').text('XÁC NHẬN GIAO: ' + o.soDon);
        const list = $('#delivery-items-list');
        list.empty();

        o.products.forEach((p, i) => {
            list.append(`
                <div class="card-custom bg-light border-0 p-2 mb-2">
                    <div class="fw-bold small mb-1">${p.name}</div>
                    <div class="row g-2">
                        <div class="col-8">
                            <div class="input-group input-group-sm">
                                <span class="input-group-text">Thực tế</span>
                                <input type="number" class="form-control fw-bold text-success del-qty" data-idx="${i}" value="${p.qty}">
                                <span class="input-group-text">${p.unit}</span>
                            </div>
                        </div>
                        <div class="col-4">
                             <input type="number" class="form-control form-control-sm del-dens" data-idx="${i}" placeholder="d" value="${p.density || ''}">
                        </div>
                    </div>
                </div>
            `);
        });

        show('modal-delivery');
    }

    async function submitDeliveryForm() {
        const files = $('#inp-del-img')[0].files;
        if (!files.length) return alert('Vui lòng chụp ít nhất 1 ảnh chứng minh!');

        showLoading('Đang xử lý...');

        const images = [];
        for (let i = 0; i < files.length; i++) {
            const b64 = await toBase64(files[i]);
            images.push(b64);
        }

        const data = {
            type: state.currentOrder.soDon.startsWith('NK') ? 'NHAP' : 'XUAT',
            report_date: new Date().toISOString().split('T')[0],
            partner: state.currentOrder.khach,
            driver_name: state.user.name,
            plate: state.user.plate || '',
            warehouse: $('input[name="del-wh"]:checked').val(),
            cart: state.currentOrder.products.map((p, i) => ({
                product: p.name,
                code: p.code,
                weight_kg: $(`.del-qty[data-idx="${i}"]`).val(),
                density: $(`.del-dens[data-idx="${i}"]`).val(),
                unit: p.unit,
                isShell: false
            })),
            images: images,
            note: $('#inp-del-note').val(),
            orderRowIndex: state.currentOrder.rowIndex,
            sender: state.user.name
        };

        google.script.run
            .withSuccessHandler(res => {
                hideLoading();
                alert(res.msg);
                if (!res.error) {
                    hide('modal-delivery');
                    hide('modal-detail');
                    loadMyOrders();

        res.data.forEach(d => {
            let pHtml = '';
            d.products.forEach(p => {
                if (p.in > 0) pHtml += `<div class="d-flex justify-content-between"><span>${p.name}</span><span class="text-success">In: ${p.in.toLocaleString()}</span></div>`;
                if (p.out > 0) pHtml += `<div class="d-flex justify-content-between"><span>${p.name}</span><span class="text-warning">Out: ${p.out.toLocaleString()}</span></div>`;

    function downloadExcelSafe() {
        const e = $(event.target);
        e.prop("disabled", true);

        google.script.run
            .withSuccessHandler(n => {
                e.prop("disabled", false);
                if (n.error) return alert("Lỗi: " + n.msg);

                const a = atob(n.base64);
                const l = new Array(a.length);
                for (let e = 0; e < a.length; e++) l[e] = a.charCodeAt(e);
                const i = new Uint8Array(l);
                const r = new Blob([i], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
                const s = document.createElement("a");
                s.href = URL.createObjectURL(r);
                s.download = n.fileName;
                document.body.appendChild(s);
                s.click();
                document.body.removeChild(s);
            })
            .withFailureHandler(n => {
                alert("Lỗi: " + n);
                e.prop("disabled", false);
            })
            .exportReportExcel($("#rpt-start").val(), $("#rpt-end").val(), "", "");
    }

        const name = $('#transfer-item-name').val();
        const qty = $('#transfer-item-qty').val();

        if (!name || !qty) return alert('Nhập đủ thông tin!');

        state.transferItems.push({ name, qty: Number(qty) });
        renderTransferItems();
        $('#transfer-item-name, #transfer-item-qty').val('');
    }

    function renderTransferItems() {
        const c = $('#transfer-items');
        c.empty();

        if (!state.transferItems.length) {
            c.html('<div class="text-muted small text-center py-3">Chưa có mặt hàng</div>');
            return;
        }

        state.transferItems.forEach((item, i) => {
            c.append(`
      <div class="d-flex justify-content-between align-items-center border-bottom py-2">
        <span>${item.name}</span>
        <span><strong>${item.qty}</strong> Kg <span class="text-danger ms-2" style="cursor:pointer" onclick="state.transferItems.splice(${i},1);renderTransferItems()">✕</span></span>
      </div>
    `);
        });
    }

    function submitTransfer() {
        if (!state.transferItems.length) return alert('Chưa có mặt hàng cần chuyển!');

        const data = {
            fromWarehouse: $('#transfer-from').val(),
            toWarehouse: $('#transfer-to').val(),
            items: state.transferItems,
            user: state.user.name
        };

        if (data.fromWarehouse === data.toWarehouse) {
            return alert('Kho xuất và kho nhập phải khác nhau!');
        }

        showLoading();
        google.script.run
            .withSuccessHandler(res => {
                hideLoading();
                alert(res.msg);
                if (!res.error) {
                    hide('modal-transfer');
                    loadWarehouseData();
                }
            })
            .adminTransferStock(data);
    }
</script>
